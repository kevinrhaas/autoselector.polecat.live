name: CI

# Advisory checks on PRs and non-main pushes — NEVER a deploy gate (fleet rule;
# see polecat-platform docs/AUTOMATION.md: smoke stays advisory, auto-revert.yml
# heals main). This is the fast, browser-free subset for quick PR signal; the
# full Playwright smoke runs in the steward/CI path before merge, not here.
on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax-check every source module
        run: |
          set -e
          # Skip the vendored shell (read-only, integrity-checked at vendor time
          # + by the weekly tech sweep) and the frozen /v/<n>/ release snapshots.
          for f in $(git ls-files '*.js' '*.mjs' | grep -vE '^(vendor/|v/)'); do
            node --input-type=module --check < "$f" || { echo "SYNTAX FAIL: $f"; exit 1; }
          done
      - name: Changelog contract (manager's exact parser)
        run: node .github/check-changelog.mjs
