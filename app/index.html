<!doctype html>
<html lang="en" data-palette="auto" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="description" content="AutoSelector — the joyful way to find your 2026 car. Every US model, fun finders, honest specs."/>
  <meta name="theme-color" content="#090d18"/>
  <title>AutoSelector</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="apple-touch-icon" href="/favicon.svg"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="/vendor/polecat-shell/tokens.css"/>
  <link rel="stylesheet" href="/vendor/polecat-shell/shell.css"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <!-- Apply saved theme + simple/reduced-motion before first paint to avoid a flash. -->
  <script>
    (function(){try{
      var raw=localStorage.getItem('as.theme.v1')||'auto:dark';
      var parts=raw.split(':'), palette=parts[0]||'auto', mode=parts[1]||'dark';
      if(mode==='system') mode=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
      var r=document.documentElement;
      r.setAttribute('data-palette',palette); r.setAttribute('data-theme',mode);
      var ws=JSON.parse(localStorage.getItem('as.workspace')||'{}');
      if(ws&&ws.settings){
        if(ws.settings.reduceMotion) r.setAttribute('data-reduce-motion','1');
        if(ws.settings.simpleMode) r.setAttribute('data-simple','1');
      }
    }catch(e){}})();
  </script>
</head>
<body>
  <div class="aurora" aria-hidden="true"><span></span><span></span><span></span></div>
  <div id="app"></div>
  <div id="toasts"></div>
  <script type="module" src="/js/app.js"></script>
  <script>
    // Offline app shell — scoped to /app/ only so it never shadows the
    // marketing site or archived /v/<n>/ build snapshots.
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('/sw.js', { scope:'/app/' }).catch(()=>{});
      });
    }
  </script>
</body>
</html>
